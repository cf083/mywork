name: Download distroless base-debian12:nonroot

on:
  workflow_dispatch: # 允許手動觸發

jobs:
  download_and_export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Docker Image
        run: |
          # 下載 gcr.io/distroless/base-debian12:nonroot 映像檔
          docker pull gcr.io/distroless/base-debian12:nonroot

      - name: Save Docker Image to Tarball
        run: |
          # 將 image 匯出為 .tar 檔案 (適用於離線匯入)
          docker save -o distroless-base-debian12-nonroot.tar gcr.io/distroless/base-debian12:nonroot

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: distroless-base-debian12-nonroot-tarball
          path: distroless-base-debian12-nonroot.tar
          retention-days: 7 # 產生的檔案保留 7 天